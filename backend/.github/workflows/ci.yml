
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Tests (FastAPI) ─────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ALLOWED_ORIGINS: http://localhost:3000
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          REFRESH_TOKEN_EXPIRE_DAYS: 14
        run: |
          pip install pytest pytest-asyncio httpx
          pytest --tb=short -v

  # ── Frontend Tests (Next.js) ────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build

  # ── Deploy (main branch only) ───────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deploy triggered"

      - name: Deploy frontend to Vercel
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Vercel deploy triggered"


## 2. Add GitHub Secrets

#Go to your repo → **Settings → Secrets and variables → Actions → New repository secret**:

TEST_DATABASE_URL        → Neon dev branch connection string
JWT_SECRET_KEY           → your secret key
NEXT_PUBLIC_API_BASE_URL → https://cultural-hub.onrender.com/api/v1
RENDER_DEPLOY_HOOK       → from Render dashboard
VERCEL_DEPLOY_HOOK       → from Vercel dashboard


# **Get Render deploy hook:**
# - Render → your service → **Settings → Deploy Hook → Generate** → copy the URL

# **Get Vercel deploy hook:**
# - Vercel → your project → **Settings → Git → Deploy Hooks**
# - Create one named `github-actions` on branch `main` → copy the URL



## 3. Protect main and develop branches

Go to repo → **Settings → Branches → Add branch protection rule** and do this **twice** — once for `main` and once for `develop`:

**For `main`:**
```
Branch name pattern: main

☑ Require a pull request before merging
☑ Require status checks to pass before merging
  → Backend Tests
  → Frontend Tests
☑ Require branches to be up to date before merging
☑ Do not allow bypassing the above settings
☑ Restrict who can push to matching branches (add yourself)
```

**For `develop`:**
```
Branch name pattern: develop

☑ Require a pull request before merging
☑ Require status checks to pass before merging
  → Backend Tests
  → Frontend Tests
```

---

## 4. Neon dev branch for tests

#Since you're using Neon, create a separate branch for CI tests so tests never touch your production data:

1. Neon dashboard → **Branches → New Branch**
2. Name it `ci-tests`, branch from `main`
3. Copy the connection string
4. Use it as `TEST_DATABASE_URL` in GitHub secrets

---

## 5. Your full flow
```
Push to develop
      ↓
GitHub Actions: backend tests + frontend build
      ↓
Pass → can merge to main via PR
      ↓
Merge to main
      ↓
GitHub Actions runs again on main
      ↓
Tests pass → Deploy job triggers
      ↓
Render redeploys FastAPI 
Vercel redeploys Next.js 
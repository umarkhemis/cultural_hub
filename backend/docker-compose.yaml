
version: "3.9"

services:
  db:
    image: postgres:16
    container_name: culturalhub
    restart: unless-stopped
    environment:
      POSTGRES_DB: culturalhub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: culturalhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: culturalhub_api
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  postgres_data:
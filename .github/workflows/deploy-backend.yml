
name: Deploy Backend

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy
        run: curl --fail --silent --show-error -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"